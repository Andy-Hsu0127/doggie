<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Doggie — 伺服器控制台</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090f;
      --surface: #111218;
      --surface2: #18191f;
      --surface3: #1f2028;
      --border: rgba(255,255,255,0.06);
      --accent: #f97316;
      --accent-glow: rgba(249,115,22,0.25);
      --accent-dim: rgba(249,115,22,0.12);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --yellow: #f59e0b;
      --blue: #60a5fa;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 0%, rgba(249,115,22,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 100%, rgba(99,102,241,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 28px 24px; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px; padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon { font-size: 36px; filter: drop-shadow(0 0 12px var(--accent-glow)); }
    .logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
    .logo-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .conn-pill {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted); transition: all 0.3s;
    }
    .conn-pill.ok { color: var(--green); border-color: rgba(34,197,94,0.2); background: var(--green-dim); }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* ── Main layout ── */
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
    }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

    /* ── Status blob ── */
    .status-blob {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      margin-bottom: 14px; transition: all 0.4s;
    }
    .status-blob.running { border-color: rgba(34,197,94,0.25); background: var(--green-dim); }
    .status-blob.stopped { border-color: rgba(239,68,68,0.2); background: var(--red-dim); }
    .pulse-ring {
      position: relative; width: 16px; height: 16px; flex-shrink: 0;
    }
    .pulse-ring .inner {
      position: absolute; inset: 3px; border-radius: 50%; background: var(--red); transition: background 0.3s;
    }
    .pulse-ring.running .inner { background: var(--green); }
    .pulse-ring.running::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--green); opacity: 0.4;
      animation: ripple 1.8s ease-out infinite;
    }
    @keyframes ripple {
      0% { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(2); opacity: 0; }
    }
    .status-info strong { font-size: 17px; font-weight: 700; display: block; }
    .status-info small { font-size: 11px; color: var(--text-muted); }

    /* ── Stats ── */
    .stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 12px; background: var(--surface2); border-radius: 8px;
      border: 1px solid var(--border);
    }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-val { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); }
    .stat-val.accent { color: var(--accent); }

    /* ── Buttons ── */
    .btn-stack { display: flex; flex-direction: column; gap: 9px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px 18px;
      border-radius: 10px; border: none;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: white; opacity: 0; transition: opacity 0.15s;
    }
    .btn:active::after { opacity: 0.08; }
    .btn-start { background: var(--green); color: #fff; }
    .btn-start:hover:not(:disabled) { background: #16a34a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .btn-start:disabled { background: var(--green-dim); color: rgba(34,197,94,0.5); cursor: not-allowed; }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-stop:hover:not(:disabled) { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }
    .btn-stop:disabled { background: var(--red-dim); color: rgba(239,68,68,0.5); cursor: not-allowed; }
    .btn-open {
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid rgba(249,115,22,0.25);
    }
    .btn-open:hover:not(:disabled) { background: var(--accent); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
    .btn-open:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-sm {
      padding: 6px 12px; border-radius: 7px;
      background: var(--surface3); color: var(--text-dim);
      border: 1px solid var(--border);
      font-size: 12px; font-weight: 500;
    }
    .btn-sm:hover { background: var(--surface2); }

    /* ── Log panel ── */
    .log-panel { display: flex; flex-direction: column; height: 100%; }
    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .log-actions { display: flex; align-items: center; gap: 10px; }
    .toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted); cursor: pointer; user-select: none;
    }
    .toggle input { accent-color: var(--accent); }
    .terminal {
      flex: 1; min-height: 420px;
      background: #050508;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 14px 16px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px; line-height: 1.85;
    }
    .terminal::-webkit-scrollbar { width: 4px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 2px; }
    .log-entry { display: flex; gap: 12px; }
    .log-t { color: #2d3748; flex-shrink: 0; font-size: 10.5px; padding-top: 2px; }
    .log-msg { flex: 1; word-break: break-all; white-space: pre-wrap; }
    .log-out .log-msg { color: #64748b; }
    .log-err .log-msg { color: #f59e0b; }
    .log-info .log-msg { color: #60a5fa; }
    .log-out.ready .log-msg { color: #a3e635; }

    /* ── Footer strip ── */
    .footer {
      margin-top: 16px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: center; gap: 20px;
    }
    .quick-link {
      font-size: 12px; color: var(--text-muted); text-decoration: none;
      transition: color 0.2s;
    }
    .quick-link:hover { color: var(--accent); }
    .divider { width: 1px; height: 14px; background: var(--border); }
  </style>
</head>
<body>
<div class="wrap">
  <!-- Warning banner when opened as file:// -->
  <div id="fileBanner" style="display:none;margin-bottom:16px;padding:12px 18px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.35);border-radius:12px;font-size:13px;color:#f59e0b;">
    ⚠ 您正在直接開啟 HTML 檔案。請先雙擊 <strong>control.bat</strong> 啟動控制伺服器，控制台才能正常連線。
  </div>
  <header>
    <div class="logo-icon">🐾</div>
    <div class="logo-text">
      <h1>Doggie 伺服器控制台</h1>
      <p>Next.js 16 開發伺服器管理面板</p>
    </div>
    <div class="conn-pill" id="connPill">
      <div class="conn-dot"></div>
      <span id="connText">連線中...</span>
    </div>
  </header>

  <div class="layout">
    <!-- Left: status + controls -->
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="card">
        <div class="card-title">伺服器狀態</div>
        <div class="status-blob stopped" id="statusBlob">
          <div class="pulse-ring" id="pulseRing"><div class="inner"></div></div>
          <div class="status-info">
            <strong id="statusText">已停止</strong>
            <small id="statusSub">伺服器目前未運行</small>
          </div>
        </div>
        <div class="stats">
          <div class="stat-row">
            <span class="stat-label">應用程式埠口</span>
            <span class="stat-val accent">:3000</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">控制台埠口</span>
            <span class="stat-val">:3001</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">程序 PID</span>
            <span class="stat-val" id="pidVal">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">執行時間</span>
            <span class="stat-val" id="uptimeVal">—</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">控制操作</div>
        <div class="btn-stack">
          <button class="btn btn-start" id="btnStart" onclick="doAction('start')">
            ▶&nbsp; 啟動伺服器
          </button>
          <button class="btn btn-stop" id="btnStop" onclick="doAction('stop')">
            ■&nbsp; 停止伺服器 (Port 3000)
          </button>
          <button class="btn btn-open" id="btnOpen" onclick="openApp()" disabled>
            ↗&nbsp; 開啟應用程式
          </button>
          <button class="btn btn-stop" style="background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171;" onclick="doShutdown()">
            ✕&nbsp; 關閉控制台與所有服務
          </button>
        </div>
      </div>
    </div>

    <!-- Right: log terminal -->
    <div class="card log-panel">
      <div class="log-toolbar">
        <div class="card-title" style="margin:0">📋 即時伺服器日誌</div>
        <div class="log-actions">
          <label class="toggle">
            <input type="checkbox" id="autoScroll" checked>
            自動捲動
          </label>
          <button class="btn btn-sm" onclick="clearLogs()">清除</button>
        </div>
      </div>
      <div class="terminal" id="terminal">
        <div class="log-entry log-info">
          <span class="log-t">--:--:--</span>
          <span class="log-msg">正在連接控制台...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a class="quick-link" href="http://localhost:3000" target="_blank">🌐 localhost:3000</a>
    <div class="divider"></div>
    <a class="quick-link" href="http://localhost:3000/survey" target="_blank">📋 問卷頁面</a>
    <div class="divider"></div>
    <a class="quick-link" href="http://localhost:3000/login" target="_blank">🔐 後台登入</a>
    <div class="divider"></div>
    <a class="quick-link" href="http://localhost:3000/admin/dashboard" target="_blank">📊 管理儀表板</a>
  </div>
</div>

<script>
  let startTime = null
  let uptimeInterval = null

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function setConn(ok) {
    const pill = document.getElementById('connPill')
    const txt = document.getElementById('connText')
    pill.className = `conn-pill ${ok ? 'ok' : ''}`
    txt.textContent = ok ? '已連線' : '已斷線'
  }

  function updateUI(running, pid) {
    const blob = document.getElementById('statusBlob')
    const ring = document.getElementById('pulseRing')
    const txt = document.getElementById('statusText')
    const sub = document.getElementById('statusSub')
    const pidEl = document.getElementById('pidVal')

    blob.className = `status-blob ${running ? 'running' : 'stopped'}`
    ring.className = `pulse-ring ${running ? 'running' : ''}`
    txt.textContent = running ? '運行中' : '已停止'
    txt.style.color = running ? 'var(--green)' : 'var(--red)'
    sub.textContent = running ? 'http://localhost:3000 已就緒' : '伺服器目前未運行'
    pidEl.textContent = pid ?? '—'

    document.getElementById('btnStart').disabled = running
    document.getElementById('btnStop').disabled = !running
    document.getElementById('btnOpen').disabled = !running

    if (running && !startTime) {
      startTime = Date.now()
      uptimeInterval = setInterval(updateUptime, 1000)
    }
    if (!running) {
      startTime = null
      clearInterval(uptimeInterval)
      document.getElementById('uptimeVal').textContent = '—'
    }
  }

  function updateUptime() {
    if (!startTime) return
    const s = Math.floor((Date.now() - startTime) / 1000)
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60
    document.getElementById('uptimeVal').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
  }

  function addLog(entry) {
    const terminal = document.getElementById('terminal')
    const isReady = (entry.line || '').includes('Ready in') || (entry.line || '').includes('✓ Ready')
    const div = document.createElement('div')
    div.className = `log-entry log-${entry.type} ${isReady ? 'ready' : ''}`
    div.innerHTML = `<span class="log-t">${esc(entry.t)}</span><span class="log-msg">${esc(entry.line)}</span>`
    terminal.appendChild(div)
    while (terminal.children.length > 600) terminal.removeChild(terminal.firstChild)
    if (document.getElementById('autoScroll').checked) terminal.scrollTop = terminal.scrollHeight
  }

  function clearLogs() { document.getElementById('terminal').innerHTML = '' }

  function openApp() { window.open('http://localhost:3000', '_blank') }

  async function doAction(action) {
    document.getElementById(`btn${action === 'start' ? 'Start' : 'Stop'}`).disabled = true
    try { await fetch(`${API_BASE}/api/${action}`, { method: 'POST' }) } catch (_) {}
  }

  async function doShutdown() {
    if (!confirm('確定要完整關閉控制器與 Next.js 伺服器嗎？')) return
    try {
      await fetch(`${API_BASE}/api/shutdown`, { method: 'POST' })
      alert('已送出關閉指令，控制台與服務已完全退出。您可以關閉此網頁頁面。')
      window.close()
    } catch (_) {
      alert('控制台已關閉')
    }
  }

  // SSE
  function connect() {
    const es = new EventSource(`${API_BASE}/api/events`)
    es.onopen = () => setConn(true)
    es.onerror = () => { setConn(false); setTimeout(connect, 3000) }
    es.onmessage = e => {
      const d = JSON.parse(e.data)
      if (d.ev === 'init') {
        updateUI(d.running, d.pid)
        document.getElementById('terminal').innerHTML = ''
        if (d.logs) d.logs.forEach(addLog)
      } else if (d.ev === 'status') {
        updateUI(d.running, d.pid)
      } else if (d.ev === 'log') {
        addLog(d)
      }
    }
  }

  const API_BASE = 'http://localhost:3001'

  // Show warning if opened directly as a file
  if (location.protocol === 'file:') {
    document.getElementById('fileBanner').style.display = 'block'
  }

  updateUI(false, null)
  connect()
</script>
</body>
</html>
